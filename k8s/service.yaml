apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: nexus
spec:
  type: NodePort
  selector:
    app: nexus
  ports:
    - name: webhook
      port: 9876
      targetPort: 9876
      nodePort: 30876
      protocol: TCP
    - name: terminal-ws
      port: 9877
      targetPort: 9877
      nodePort: 30879
      protocol: TCP
