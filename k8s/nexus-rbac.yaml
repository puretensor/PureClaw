apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nexus-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nexus-pod-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: nexus
roleRef:
  kind: ClusterRole
  name: nexus-pod-reader
  apiGroup: rbac.authorization.k8s.io
