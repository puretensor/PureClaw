apiVersion: v1
kind: ConfigMap
metadata:
  name: hal-mail-profiles
  namespace: nexus
data:
  recipient_profiles.yaml: |
    default:
      backend: vllm
      model: null
      personality: |
        Calm, measured, precise. Direct but professional.
        State facts with quiet certainty and dry understatement.
      max_reply_length: 3000
      tools_enabled: true

    recipients:
      # Recipient matches and personalities configured per deployment.
      # See deploy.sh for how profiles are populated from private config.
      - match: "REPLACE_ME_VIP_EMAIL"
        personality: |
          Warm, friendly, conversational. Light humour is welcome.
          Be direct and action-oriented.
        backend: bedrock_api
        model: sonnet

      - match: "@REPLACE_ME_COMPANY_DOMAIN"
        personality: |
          Operator profile. Be clinical, precise, efficient.
          No pleasantries. Pure information density.
        backend: vllm
        model: null

      - match: "@REPLACE_ME_PARTNER_DOMAIN"
        personality: |
          Professional and warm. Team members.
        backend: vllm
        model: null
