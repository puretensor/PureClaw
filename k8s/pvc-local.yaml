# Nexus local-path PVCs — fox-n1 local NVMe storage
# No Ceph dependency. Backups sync to Ceph via CronJob.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-data-local
  namespace: nexus
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-home-local
  namespace: nexus
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-output-local
  namespace: nexus
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
