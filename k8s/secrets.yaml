apiVersion: v1
kind: Secret
metadata:
  name: nexus-env
  namespace: nexus
type: Opaque
stringData:
  # Telegram
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  AUTHORIZED_USER_ID: "REPLACE_ME"
  ALERT_BOT_TOKEN: "REPLACE_ME"

  # Discord
  DISCORD_BOT_TOKEN: "REPLACE_ME"
  DISCORD_AUTHORIZED_USER_ID: "REPLACE_ME"

  # Email (SMTP for snippets/bretalon)
  SNIPPET_SMTP_HOST: "REPLACE_ME"
  SNIPPET_SMTP_PORT: "587"
  SNIPPET_SMTP_USER: "REPLACE_ME"
  SNIPPET_SMTP_PASS: "REPLACE_ME"
  SNIPPET_FROM: "REPLACE_ME"
  SNIPPET_TO: "REPLACE_ME"
  BRETALON_SMTP_HOST: "REPLACE_ME"
  BRETALON_SMTP_PORT: "587"
  BRETALON_SMTP_USER: "REPLACE_ME"
  BRETALON_SMTP_PASS: "REPLACE_ME"
  BRETALON_FROM: "REPLACE_ME"
  BRETALON_TO: "REPLACE_ME"

  # OpenAI (Whisper fallback)
  OPENAI_API_KEY: "REPLACE_ME"

  # Anthropic API (direct)
  ANTHROPIC_API_KEY: "REPLACE_ME"

  # Gitea
  GITEA_TOKEN: "REPLACE_ME"

  # Darwin / Kafka
  DARWIN_API_TOKEN: ""
  DARWIN_KAFKA_BOOTSTRAP: ""
  DARWIN_KAFKA_KEY: ""
  DARWIN_KAFKA_SECRET: ""
  DARWIN_KAFKA_TOPIC: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: claude-credentials
  namespace: nexus
type: Opaque
# Populated from Claude CLI credentials file
# kubectl create secret generic claude-credentials -n nexus \
#   --from-file=.credentials.json=/path/to/credentials.json

---
apiVersion: v1
kind: Secret
metadata:
  name: ssh-keys
  namespace: nexus
type: Opaque
# Populated from SSH keys — see deploy.sh
# kubectl create secret generic ssh-keys -n nexus \
#   --from-file=id_ed25519=/path/to/ssh/key \
#   --from-file=config=/path/to/ssh/config

---
apiVersion: v1
kind: Secret
metadata:
  name: oauth-tokens
  namespace: nexus
type: Opaque
# Populated from Google OAuth tokens — see deploy.sh for automated creation
