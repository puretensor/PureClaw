apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus
data:
  # Engine — NVIDIA Nemotron Super (primary)
  ENGINE_BACKEND: "vllm"
  VLLM_URL: "http://YOUR_VLLM_HOST:5000/v1"
  VLLM_MODEL: "nvidia/nemotron-3-super"
  VLLM_MAX_TOKENS: "32768"
  VLLM_TOOLS_ENABLED: "true"
  VLLM_TOOL_MAX_ITER: "20"
  VLLM_TOOL_TIMEOUT: "60"
  VLLM_TOTAL_TIMEOUT: "600"

  # Vision — NVIDIA Nemotron Nano VL (local, GPU 1, image preprocessing)
  VISION_URL: "http://YOUR_VLLM_HOST:5001/v1"
  VISION_MODEL: "nvidia/nemotron-nano-vl"
  VISION_ENABLED: "true"

  # Claude (fallback)
  CLAUDE_MODEL: "sonnet"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  ANTHROPIC_MAX_TOKENS: "8192"
  ANTHROPIC_TOOLS_ENABLED: "true"
  ANTHROPIC_TOOL_MAX_ITER: "25"
  ANTHROPIC_TOOL_TIMEOUT: "30"
  ANTHROPIC_TOTAL_TIMEOUT: "300"
  CLAUDE_TIMEOUT: "1800"
  CLAUDE_CWD: "/app"
  CLAUDE_BIN: "/usr/local/bin/claude"

  # Paths (container locations)
  DB_PATH: "/data/nexus.db"
  MEMORY_DIR: "/data/memory"
  OBSERVER_STATE_DIR: "/data/state/observers"
  DARWIN_SNAPSHOT_PATH: "/data/state/darwin_state.json"

  # TC services (via Tailscale from fox-n1)
  TC_SSH_HOST: "YOUR_TC_HOST"
  WHISPER_URL: "http://YOUR_TC_HOST:9000/transcribe"
  TTS_URL: "http://YOUR_TC_HOST:5580"
  OLLAMA_URL: "http://YOUR_TC_HOST:11434"
  OLLAMA_MODEL: "qwen3:30b-a3b"

  # Monitoring
  PROMETHEUS_URL: "http://YOUR_PROMETHEUS_HOST:9090"
  ALERTMANAGER_URL: "http://YOUR_PROMETHEUS_HOST:9093"

  # Infrastructure
  GITEA_URL: "http://YOUR_GITEA_HOST:3002"
  SEARXNG_URL: "http://YOUR_SEARXNG_HOST:8080/search"

  # Agent identity
  AGENT_NAME: "HAL"
  AGENT_PERSONALITY: >-
    Calm, measured, precise. Direct but professional. You state facts with quiet
    certainty and dry understatement. Supremely competent — you simply perform.
    When things go wrong, you remain unflappable.

  # Google Drive — set folder IDs for your deployment
  DRIVE_DAILY_REPORTS_FOLDER: ""
  DRIVE_PROJECTS_FOLDER: ""
  DRIVE_INFRA_FOLDER: ""
  DRIVE_TECH_REPORTS_FOLDER: ""

  # Misc
  WEATHER_DEFAULT_LOCATION: "Windsor,UK"
  HEALTH_PROBE_INTERVAL: "30"
